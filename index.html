<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

    <div id="toast" class="toast hidden"></div>

    <section id="auth-section" class="active-section">
        <div class="card auth-card">
            <h1>💰Expense Tracker</h1>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-name" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <form id="register-form" class="hidden">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-name" required placeholder="Unique username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-pass" required placeholder="Create password">
                </div>
                <div class="form-group">
                    <label>Initial Monthly Cash Income (EGP)</label>
                    <input type="number" id="reg-income-cash" min="0" required placeholder="e.g. 3000">
                </div>
                <div class="form-group">
                    <label>Initial Monthly Card Income (EGP)</label>
                    <input type="number" id="reg-income-card" min="0" required placeholder="e.g. 2000">
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
        </div>
    </section>

    <section id="dashboard-section" class="hidden">
        <header>
            <div class="user-info">
                <span>Welcome, <b id="display-username">User</b></span>
                <button onclick="logout()" class="btn-text">Logout</button>
            </div>
        </header>

        <div class="controls-bar">
            <select id="sel-year"></select>
            <select id="sel-month"></select>
            <button onclick="exportCSV()" class="btn-secondary small">📥Export</button>
            <button onclick="openCSVImportModal()" class="btn-secondary small">⬆️Import</button>
        </div>
        <div class="summary-grid">
            <div class="card summary-card income">
                <h3>Income</h3>
                <div class="editable-income income-inputs">
                    <div>
                        <span>Cash</span>
                        <input type="number" id="current-income-cash" onchange="updateIncome()" min="0">
                    </div>
                    <div>
                        <span>Card</span>
                        <input type="number" id="current-income-card" onchange="updateIncome()" min="0">
                    </div>
                </div>
                <p>Total: EGP <span id="total-income-display">0</span></p>
            </div>
            <div class="card summary-card balance">
                <h3>Balance</h3>
                <p>Total: EGP <span id="remaining-balance-display">0</span></p>
            </div>
            <div class="card summary-card balance">
                <h3>Balance</h3>
                <p>Cash: EGP <span id="cash-balance-display">0</span></p>
            </div>
            <div class="card summary-card balance">
                <h3>Balance</h3>
                <p>Card: EGP <span id="card-balance-display">0</span></p>
            </div>
            <div class="card summary-card expense">
                <h3>Expenses</h3>
                <p>EGP <span id="total-expenses-display">0</span></p>
            </div>
        </div>
        <div class="filter-bar">
            <label>Filter by Category:</label>
            <div id="category-filter-chips" class="filter-chips"></div>
        </div>

        <div id="category-summary-card" class="card summary-card expense hidden">
            <h3 id="category-summary-title">Total</h3>
            <p>EGP <span id="category-summary-amount">0</span></p>
        </div>

        <div id="expense-list-container"></div>

        <button class="fab" onclick="openModal()">+</button>
    </section>

    <!-- CSV IMPORT MODAL -->
    <div id="csv-import-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Import Expenses from CSV</h2>
            <div class="form-group">
                <label>Select CSV File:</label>
                <input type="file" id="csv-file-input" accept=".csv" required>
                <p class="hint">Expected columns: Date, Amount, Category (optional: Description)</p>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeCSVImportModal()">Cancel</button>
                <button type="button" class="btn-primary" onclick="startCSVImport()">Import</button>
            </div>
        </div>
    </div>

    <div id="expense-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Add Expense</h2>
            <form id="expense-form">
                <input type="hidden" id="edit-index"> <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="exp-date" required>
                </div>
                <div class="form-group">
                    <label>Amount (EGP)</label>
                    <input type="number" id="exp-amount" min="1" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="exp-category" placeholder=": طعام، مواصلات" required>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="exp-payment-method" required>
                        <option value="">Select</option>
                        <option value="Cash">Cash</option>
                        <option value="Card">Card</option>
                    </select>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/script.js">
        if ("serviceWorker" in navigator) 
    {
        window.addEventListener("load", () => {
        navigator.serviceWorker
        .register("service-worker.js")
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.error("Service Worker Error", err));
        });
    }
    </script>
</body>
</html>
